<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8s">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="main-container" id="main">
        <p><strong>Rock Paper Scissors Game</strong></p>
        <div class="buttons">
            <button class="play-button" id="js-rock"><img src="images/rock.png" class="images"></button>
            <button class="play-button" id="js-paper"><img src="images/paper.png" class="images"></button>
            <button class="play-button" id="js-scissors"><img src="images/scissors.png" class="images"></button>
        </div>
        <p id="js-score">Win = 0 | Tie = 0 | Lose = 0</p>
        <button class="reset-button" id="js-reset">Reset</button>
        <button class="autoplay-button" id="js-auto">Auto Play</button>
        <div id="js-isAutoPlay"></div>
        <div class="result" id="js-result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
