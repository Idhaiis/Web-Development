<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-div">
        <div class="options-div">
            <button class="option-button" id="mp3Button"><strong>MP3</strong> (Audio)</button>
            <button class="option-button" id="mp4Button"><strong>MP4</strong> (Video)</button>           
        </div>
        <div class="convert-div">
            <input type="text" class="input-box" placeholder="Paste your YouTube link" id="inputBox">
            <button class="convert-button" id="convertButton">Convert</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
