<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Random Password Generator</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="password-container">
		<h2>Random Password Generator</h2>
		<div class="input-container">
			<input 
				type="text" 
				id="input" 
				class="input" 
				placeholder="Create Password"
				width="400px" 
				readonly
			>
			<img class="copyIcon"src="copy.png" alt="" width="32px">
		</div>
		<button class="generateButton">Generate</button>
		
		<label for="char-limit" style="margin-left: 30px;">Password Lenght:</label>
		<input type="range" id="char-limit" min="6" max="24" value="14">
		<span id="char-count">14</span>
		
	</div>
	<div class="alert-container active">Password Coppied</div>
	<script src="script.js"></script>
</body>
</html>
